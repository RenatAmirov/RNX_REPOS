# Это файл конфигурации для стека.
# Используется резолвер, указывающий конкретный набор пакетов (LTS Haskell).
resolver: lts-22.13   # Актуальная версия на момент написания (используйте последнюю стабильную)

# Локальные пакеты, которые нужно собрать.
packages:
  - .

# Дополнительные настройки (необязательно)
extra-deps: []

# Флаг для использования GHC 9.6 или новее (зависит от резолвера)
compiler: ghc-9.6.5